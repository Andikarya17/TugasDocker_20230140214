<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Input Mahasiswa</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9fafb; display: flex; justify-content: center; padding: 3rem 1rem; margin: 0; color: #1f2937; }
        .form-container { background: white; padding: 2.5rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; width: 100%; max-width: 550px; }
        h2 { margin-top: 0; color: #1e3a8a; border-bottom: 2px solid #f3f4f6; padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151; font-size: 0.95rem; }
        input[type="text"] { width: 100%; padding: 0.8rem; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .radio-group { display: flex; gap: 2rem; margin-top: 0.5rem; padding: 0.5rem 0; }
        .radio-option { display: flex; align-items: center; gap: 0.5rem; color: #4b5563; cursor: pointer; }
        .radio-option input[type="radio"] { cursor: pointer; transform: scale(1.2); }
        .btn-group { display: flex; gap: 1rem; margin-top: 2.5rem; }
        .btn { flex: 1; padding: 0.8rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; transition: all 0.2s; }
        .btn-submit { background-color: #3b82f6; color: white; }
        .btn-submit:hover { background-color: #2563eb; }
        .btn-back { background-color: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; }
        .btn-back:hover { background-color: #e5e7eb; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Form Input Mahasiswa</h2>
    <form action="/simpan-data" method="POST">
        <div class="form-group">
            <label for="nama">Nama</label>
            <input type="text" id="nama" name="nama" placeholder="Contoh: Andika Arya Putra" required>
        </div>
        <div class="form-group">
            <label for="nim">NIM</label>
            <input type="text" id="nim" name="nim" placeholder="Contoh: 20230140214" required>
        </div>
        <div class="form-group">
            <label>Jenis Kelamin</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="jenis_kelamin" value="Laki-laki" required> Laki-laki
                </label>
                <label class="radio-option">
                    <input type="radio" name="jenis_kelamin" value="Perempuan" required> Perempuan
                </label>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-submit">Submit</button>
            <a href="/home" class="btn btn-back">Kembali ke Home</a>
        </div>
    </form>
</div>
</body>
</html>
